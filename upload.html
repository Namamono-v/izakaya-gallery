<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>居酒屋「なまいっちょう」 写真アップロード</title>
<style>
  :root { --bg:#1a1410; --card:#2a201a; --accent:#e8a35c; --text:#f3e8d2; --muted:#b9a88f; --danger:#e06a6a; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
         background:var(--bg); color:var(--text); display:flex; min-height:100vh; align-items:flex-start; justify-content:center; padding:16px; }
  .card { background:var(--card); border-radius:16px; padding:24px; max-width:520px; width:100%; margin-top:12px;
          box-shadow:0 10px 40px rgba(0,0,0,.5); }
  h1 { font-size:1.25rem; margin:0 0 4px; }
  p.sub { color:var(--muted); margin:0 0 20px; font-size:.9rem; line-height:1.5; }
  .drop { border:2px dashed #5a4a3a; border-radius:12px; padding:28px 16px; text-align:center; cursor:pointer; transition:.15s; color:var(--muted); }
  .drop:hover, .drop.over { border-color:var(--accent); color:var(--text); background:rgba(232,163,92,.06); }
  #preview { max-width:100%; max-height:260px; border-radius:10px; margin-top:16px; display:none; }
  .row { display:flex; gap:10px; align-items:center; margin-top:14px; }
  input[type=text], input[type=password] { flex:1; padding:10px 12px; border-radius:8px; border:1px solid #5a4a3a; background:#1f1813; color:var(--text); font-size:1rem; }
  button { background:var(--accent); color:#2a1a08; border:0; border-radius:10px; padding:13px 18px; font-weight:700; font-size:1rem; cursor:pointer; width:100%; margin-top:16px; }
  button:disabled { opacity:.5; cursor:default; }
  .status { margin-top:14px; font-size:.9rem; min-height:1.2em; line-height:1.5; }
  .ok { color:#8fe08f; } .err { color:#ff9b9b; } .busy { color:var(--accent); }
  .hint { color:var(--muted); font-size:.78rem; margin-top:18px; line-height:1.5; }
  .link { color:var(--muted); font-size:.82rem; text-align:center; margin-top:22px; cursor:pointer; text-decoration:underline; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-top:16px; }
  .thumb { position:relative; border-radius:8px; overflow:hidden; background:#1f1813; }
  .thumb img { width:100%; aspect-ratio:16/10; object-fit:cover; display:block; }
  .thumb .del { position:absolute; top:6px; right:6px; width:auto; margin:0; padding:6px 10px; font-size:.78rem; background:var(--danger); color:#fff; border-radius:6px; }
  .thumb .no { position:absolute; left:6px; bottom:6px; background:rgba(0,0,0,.55); color:#fff; font-size:.7rem; padding:2px 6px; border-radius:4px; }
  .hidden { display:none; }
  .backlink { display:inline-block; margin-top:6px; }
</style>
</head>
<body>
  <div class="card">
    <!-- ===== アップロード画面 ===== -->
    <div id="uploadView">
      <h1>📷 居酒屋「なまいっちょう」</h1>
      <p class="sub">この居酒屋で撮った写真をアップすると、ワールドの壁に飾られます。<br>選んで「アップロード」を押すだけ。</p>
      <label class="drop" id="drop">
        ここをタップして写真を選ぶ<br>（ドラッグ＆ドロップもOK）
        <input type="file" id="file" accept="image/*" hidden>
      </label>
      <img id="preview" alt="preview">
      <div class="row"><input type="text" id="caption" maxlength="40" placeholder="ひとことキャプション（任意）"></div>
      <button id="send" disabled>アップロード</button>
      <div class="status" id="status"></div>
      <p class="hint">※ 自動で長辺1280pxに縮小して送ります。数十秒〜1分で反映。最新100枚を表示し、古いものは自動で消えます。</p>
      <div class="link" id="toManage">🔧 管理（写真の削除）はこちら</div>
    </div>

    <!-- ===== 管理(削除)画面 ===== -->
    <div id="manageView" class="hidden">
      <h1>🔧 写真の管理（削除）</h1>
      <div id="gate">
        <p class="sub">管理パスワードを入力してください。</p>
        <div class="row"><input type="password" id="pw" placeholder="パスワード"></div>
        <button id="enter">入る</button>
        <div class="status" id="gateStatus"></div>
      </div>
      <div id="manageBody" class="hidden">
        <p class="sub">削除したい写真の「削除」を押してください。即座にワールドからも消えます（CDN反映に数十秒）。</p>
        <button id="reload" style="background:#5a4a3a;color:var(--text)">一覧を更新</button>
        <div class="grid" id="grid"></div>
        <div class="status" id="manageStatus"></div>
      </div>
      <div class="link backlink" id="toUpload">← アップロードに戻る</div>
    </div>
  </div>

<script>
// ===== 設定 =====
const WORKER_URL = "https://izakaya-upload.namamono-pc.workers.dev";
const BASE = location.href.replace(/upload\.html.*$/, ""); // 同じリポジトリのルート
// ==============

const $ = id => document.getElementById(id);
function setStatus(el, msg, cls){ el.textContent = msg; el.className = "status " + (cls||""); }

/* ---------- アップロード ---------- */
const fileInput=$("file"), drop=$("drop"), preview=$("preview"), sendBtn=$("send"), captionEl=$("caption");
let currentFile=null;
drop.addEventListener('click',()=>fileInput.click());
['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('over');}));
['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('over');}));
drop.addEventListener('drop',ev=>{ if(ev.dataTransfer.files[0]) pickFile(ev.dataTransfer.files[0]); });
fileInput.addEventListener('change',()=>{ if(fileInput.files[0]) pickFile(fileInput.files[0]); });
function pickFile(f){ if(!f.type.startsWith('image/')){ setStatus($("status"),'画像ファイルを選んでください','err'); return; } currentFile=f; preview.src=URL.createObjectURL(f); preview.style.display='block'; sendBtn.disabled=false; setStatus($("status"),''); }
async function resizeToJpeg(file, maxEdge=1280, quality=0.85){
  let bmp; try{ bmp=await createImageBitmap(file,{imageOrientation:'from-image'}); }catch(e){ bmp=await createImageBitmap(file); }
  let {width:w,height:h}=bmp; const s=Math.min(1,maxEdge/Math.max(w,h));
  const cw=Math.max(1,Math.round(w*s)), ch=Math.max(1,Math.round(h*s));
  const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch; cv.getContext('2d').drawImage(bmp,0,0,cw,ch);
  return await new Promise(r=>cv.toBlob(r,'image/jpeg',quality));
}
sendBtn.addEventListener('click', async()=>{
  if(!currentFile) return;
  if(WORKER_URL.includes('REPLACE-WITH')){ setStatus($("status"),'WORKER_URL未設定（管理者へ）','err'); return; }
  sendBtn.disabled=true; setStatus($("status"),'縮小中…','busy');
  try{
    const blob=await resizeToJpeg(currentFile);
    setStatus($("status"),'アップロード中…','busy');
    const cap=encodeURIComponent(captionEl.value.trim().slice(0,40));
    const res=await fetch(WORKER_URL+'?caption='+cap,{method:'POST',headers:{'Content-Type':'image/jpeg'},body:blob});
    const data=await res.json().catch(()=>({}));
    if(res.ok){ setStatus($("status"),'✅ アップロード完了！数十秒〜1分で居酒屋に飾られます','ok'); preview.style.display='none'; currentFile=null; captionEl.value=''; }
    else { setStatus($("status"),'⚠ '+(data.error||('失敗 ('+res.status+')')),'err'); sendBtn.disabled=false; }
  }catch(e){ setStatus($("status"),'⚠ エラー: '+e.message,'err'); sendBtn.disabled=false; }
});

/* ---------- 画面切替 ---------- */
$("toManage").addEventListener('click',()=>{ $("uploadView").classList.add('hidden'); $("manageView").classList.remove('hidden'); });
$("toUpload").addEventListener('click',()=>{ $("manageView").classList.add('hidden'); $("uploadView").classList.remove('hidden'); });

/* ---------- 管理(削除) ---------- */
let MANAGE_PW="";
$("enter").addEventListener('click', doEnter);
$("pw").addEventListener('keydown',e=>{ if(e.key==='Enter') doEnter(); });
function doEnter(){
  const pw=$("pw").value;
  if(pw!=="Namam0n0"){ setStatus($("gateStatus"),'パスワードが違います','err'); return; }
  MANAGE_PW=pw; $("gate").classList.add('hidden'); $("manageBody").classList.remove('hidden'); loadList();
}
$("reload").addEventListener('click', loadList);
async function loadList(){
  const grid=$("grid"); grid.innerHTML=''; setStatus($("manageStatus"),'読み込み中…','busy');
  try{
    const m=await (await fetch(BASE+'manifest.json?t='+Date.now())).json();
    let slots=[];
    if(Array.isArray(m.ver)){ for(let k=0;k<m.ver.length;k++) if(m.ver[k]>0) slots.push(k); }
    else { const c=m.count||0; for(let k=0;k<c;k++) slots.push(k); }
    if(slots.length===0){ setStatus($("manageStatus"),'写真はまだありません',''); return; }
    setStatus($("manageStatus"),slots.length+' 枚');
    for(const k of slots){
      const div=document.createElement('div'); div.className='thumb';
      const img=document.createElement('img'); img.src=BASE+'photos/'+String(k).padStart(3,'0')+'.jpg?t='+Date.now(); img.loading='lazy';
      const no=document.createElement('span'); no.className='no'; no.textContent='slot '+k;
      const del=document.createElement('button'); del.className='del'; del.textContent='削除';
      del.addEventListener('click',()=>doDelete(k,div,del));
      div.appendChild(img); div.appendChild(no); div.appendChild(del); grid.appendChild(div);
    }
  }catch(e){ setStatus($("manageStatus"),'一覧取得エラー: '+e.message,'err'); }
}
async function doDelete(slot, div, btn){
  if(!confirm('slot '+slot+' の写真を削除しますか？')) return;
  btn.disabled=true; btn.textContent='…';
  try{
    const res=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',slot,password:MANAGE_PW})});
    const data=await res.json().catch(()=>({}));
    if(res.ok){ div.remove(); setStatus($("manageStatus"),'削除しました (slot '+slot+')','ok'); }
    else { setStatus($("manageStatus"),'⚠ '+(data.error||('失敗 ('+res.status+')')),'err'); btn.disabled=false; btn.textContent='削除'; }
  }catch(e){ setStatus($("manageStatus"),'⚠ '+e.message,'err'); btn.disabled=false; btn.textContent='削除'; }
}
</script>
</body>
</html>
